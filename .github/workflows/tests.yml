name: ServiceNow Playbook GUI Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  playwright-tests:
    name: Run Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright pytest pytest-html
          playwright install --with-deps chromium

      - name: Run tests
        env:
          SN_INSTANCE: ${{ secrets.SN_INSTANCE }}
          SN_USER: ${{ secrets.SN_USER }}
          SN_PASS: ${{ secrets.SN_PASS }}
          SN_MFA_TOKEN: ${{ secrets.SN_MFA_TOKEN }}
          BROWSER_TYPE: ${{ vars.BROWSER_TYPE || 'chromium' }}
          SCREENSHOT_DIR: screenshots
          HEADLESS: "true"
        run: |
          pytest tests/ \
            --html=report.html \
            --self-contained-html \
            --screenshots=screenshots \
            -v

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: screenshots/*.png
          retention-days: 7

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: report.html
          retention-days: 14
